name: Auto-Investing-Bot

on:
  schedule:
    # Runs every 30 minutes. Adjust the cron as you like.
    - cron: '*/30 * * * *'
  workflow_dispatch:   # allows manual run

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit posted_guids.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit and push if posted_guids.json changed
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_guids.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update posted guids [skip ci]"
            git push
          fi
