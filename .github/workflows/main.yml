name: Auto-Investing-Bot

on:
  schedule:
    - cron: '*/5 * * * *'   # (не будет работать в форке, но оставим для порядка)
  workflow_dispatch:
  repository_dispatch:        # <- новый триггер для внешнего вызова
    types: [run-bot]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug secrets (length only)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then echo "TELEGRAM_BOT_TOKEN is empty!"; else echo "TELEGRAM_BOT_TOKEN length: ${#TELEGRAM_BOT_TOKEN}"; fi
          if [ -z "$TELEGRAM_CHANNEL_ID" ]; then echo "TELEGRAM_CHANNEL_ID is empty!"; else echo "TELEGRAM_CHANNEL_ID length: ${#TELEGRAM_CHANNEL_ID}"; fi
          if [ -z "$GEMINI_API_KEY" ]; then echo "GEMINI_API_KEY is empty!"; else echo "GEMINI_API_KEY length: ${#GEMINI_API_KEY}"; fi

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Show bot log
        if: always()
        run: cat bot.log

      - name: Commit and push posted guids
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_guids.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update posted guids [skip ci]"
            git pull --rebase -X ours origin main || (echo "Rebase failed, skipping push"; exit 0)
            git push
          fi
