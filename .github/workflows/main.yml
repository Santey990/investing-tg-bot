name: Auto-Investing-Bot

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # больше не нужно для push, но оставим для checkout

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug secrets (length only)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then echo "TELEGRAM_BOT_TOKEN is empty!"; else echo "TELEGRAM_BOT_TOKEN length: ${#TELEGRAM_BOT_TOKEN}"; fi
          if [ -z "$TELEGRAM_CHANNEL_ID" ]; then echo "TELEGRAM_CHANNEL_ID is empty!"; else echo "TELEGRAM_CHANNEL_ID length: ${#TELEGRAM_CHANNEL_ID}"; fi
          if [ -z "$GEMINI_API_KEY" ]; then echo "GEMINI_API_KEY is empty!"; else echo "GEMINI_API_KEY length: ${#GEMINI_API_KEY}"; fi

      # --- КЭШ: восстановление списка обработанных GUID ---
      - name: Restore posted guids cache
        id: cache-guid
        uses: actions/cache@v4
        with:
          path: posted_guids.json
          key: posted-guids-${{ runner.os }}

      # Если кэша нет, создаём пустой файл (на случай первого запуска)
      - name: Init posted_guids.json if missing
        run: |
          if [ ! -f posted_guids.json ]; then
            echo '[]' > posted_guids.json
          fi

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Show bot log
        if: always()
        run: cat bot.log

      # --- КЭШ: сохранение обновлённого списка GUID ---
      - name: Save posted guids cache
        if: success()
        uses: actions/cache@v4
        with:
          path: posted_guids.json
          key: posted-guids-${{ runner.os }}-${{ github.run_id }}
          restore-keys: posted-guids-${{ runner.os }}
